name: Deployment Check

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  check-deployment:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Ensure submission.txt exists
        run: |
          if [ ! -f submission.txt ]; then
            echo "submission.txt not found"
            exit 1
          fi

      - name: Read URL into env
        run: |
          # remove CRLF and trim spaces
          URL="$(cat submission.txt | tr -d '\r\n' | xargs)"
          echo "URL=$URL" >> "$GITHUB_ENV"
          echo "Submitted URL: $URL"

      - name: Validate URL format
        run: |
          if [[ -z "$URL" ]]; then
            echo "Empty URL in submission.txt"
            exit 1
          fi
          if [[ ! "$URL" =~ ^https?:// ]]; then
            echo "Invalid URL format (must start with http:// or https://)"
            exit 1
          fi

      - name: Curl and content check (CSC309 on homepage)
        run: |
          set -e

          # Fetch once: save body, capture status
          STATUS=$(curl -L --fail -sS --max-time 15 \
            -o body.html -w "%{http_code}" "$URL")

          echo "HTTP Status: $STATUS"
          if [ "$STATUS" -ne 200 ]; then
            echo "Expected 200 OK, got $STATUS"
            exit 1
          fi

          echo "Checking page content for CSC309..."
          if ! grep -q "CSC309" body.html; then
            echo "Expected content 'CSC309' not found."
            exit 1
          fi

      - name: Success
        run: echo "Deployment reachable and contains CSC309. Test passed."